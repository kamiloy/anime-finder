<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>紫音 Shion · 四套服装方案</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#f0f0ff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding:2rem 1rem;text-align:center}
h1{font-size:24px;font-weight:800;margin-bottom:4px;background:linear-gradient(90deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:#5a5a80;margin-bottom:2rem}
.gallery{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;max-width:1400px;margin:0 auto}
.card{background:#0f0f1a;border:1px solid rgba(168,85,247,0.2);border-radius:16px;padding:16px;width:380px;text-align:center;transition:all .3s}
.card:hover{border-color:rgba(168,85,247,0.5);box-shadow:0 0 24px rgba(168,85,247,0.12)}
.card img{width:100%;height:auto;border-radius:12px;display:block;background:#1a1a2e}
.card .label{font-size:16px;font-weight:700;margin-top:12px}
.card .label.loli{color:#a855f7}
.card .label.academy{color:#06b6d4}
.card .label.tailcoat{color:#c084fc}
.card .label.street{color:#f472b6}
.card .desc{font-size:12px;color:#5a5a80;margin-top:4px}
.hint{margin-top:3rem;font-size:12px;color:#5a5a80}
</style>
</head>
<body>
<h1>紫音 Shion · 四套哥特服装方案</h1>
<p class="sub">Pollinations.ai 生成 · 选定最终方向后上 NovelAI 出正式版</p>
<div class="gallery">
  <div class="card">
    <img src="./shion-gothic-loli.jpg" alt="哥特萝莉" onerror="this.innerHTML='<div style=padding:4rem;color:#5a5a80>未生成</div>'">
    <div class="label loli">🖤 哥特萝莉裙</div>
    <div class="desc">多层蕾丝 · 蓬裙 · 蝴蝶结 · 华丽感</div>
  </div>
  <div class="card">
    <img src="./shion-dark-academy.jpg" alt="暗黑学院" onerror="this.innerHTML='<div style=padding:4rem;color:#5a5a80>未生成</div>'">
    <div class="label academy">📚 暗黑学院风</div>
    <div class="desc">改制JK · 黑丝 · 长靴 · 领带</div>
  </div>
  <div class="card">
    <img src="./shion-tailcoat.jpg" alt="燕尾晚礼裙" onerror="this.innerHTML='<div style=padding:4rem;color:#5a5a80>未生成</div>'">
    <div class="label tailcoat">✨ 燕尾晚礼裙</div>
    <div class="desc">修身长裙 · 高开叉 · 披肩 · 优雅</div>
  </div>
  <div class="card">
    <img src="./shion-street.jpg" alt="街头暗黑" onerror="this.innerHTML='<div style=padding:4rem;color:#5a5a80>未生成</div>'">
    <div class="label street">🔥 街头暗黑系</div>
    <div class="desc">皮质 · Choker · 马丁靴 · 叛逆</div>
  </div>
</div>
<div class="hint">💡 看中哪个告诉我，后续用更好的工具出正式立绘</div>
</body>
</html>
